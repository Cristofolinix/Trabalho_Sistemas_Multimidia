<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNEMAT Stories</title>

  <!-- Fonte pixelada -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0d1b2a;
      overflow: hidden;
    }

    /* O Phaser centraliza o canvas automaticamente (autoCenter) */
    #game {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      image-rendering: pixelated;       /* mantém os pixels nítidos ao escalar */
      image-rendering: crisp-edges;
    }
  </style>
</head>

<body>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
